# ResumeLink — Jekyll Config
title: ResumeLink
description: AI-powered resume builder that converts PDF resumes into interactive profiles with ATS score, QR code and shareable link. Free, no signup required.
url: "https://resumelink.cc"
baseurl: ""

# Collections
collections:
  roles:
    output: true
    permalink: /roles/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "roles"
    values:
      layout: "role"

# Exclude from Jekyll processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# NO jekyll-sitemap plugin — we manage sitemap.xml manually
