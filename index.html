<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeLink — AI Resume Builder | AI конструктор резюме</title>
    <meta name="description" content="AI-powered interactive resume builder. Умный AI конструктор резюме: преврати файл в стильный профиль с QR-кодом за 10 секунд.">
    <meta name="keywords" content="AI resume builder, AI конструктор резюме, интерактивное резюме, ATS score, digital CV">

    <meta property="og:title" content="ResumeLink — AI-Powered Interactive Profiles">
    <meta property="og:description" content="Transform your resume into a stylish digital profile. AI конструктор резюме нового поколения.">
    <meta property="og:image" content="https://resumelink.cc/favicon/apple-touch-icon.png">
    <meta property="og:url" content="https://resumelink.cc">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ResumeLink",
      "description": "AI tool to transform PDF resumes into interactive profiles",
      "applicationCategory": "BusinessApplication",
      "offers": { "@type": "Offer", "price": "0" }
    }
    </script>

    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/favicon/site.webmanifest">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background: #0a0a0a; font-family: 'Outfit', sans-serif; color: white; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .grid-layout { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; grid-auto-rows: min-content; }
        .card-item { background: #161616; border: 1px solid #262626; border-radius: 32px; padding: 1.8rem; transition: all 0.4s; position: relative; word-break: break-word; }
        .card-item:hover { transform: scale(1.02); border-color: #10b981; }
        .name-fix { font-weight: 900; line-height: 1.2 !important; display: block; padding: 0.15em 0; letter-spacing: -0.02em; }

        .glow-wrapper {
            position: relative;
            display: inline-block;
            padding: 3px;
            border-radius: 28px;
            overflow: hidden;
            z-index: 10;
        }

        .glow-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, #10b981, #3b82f6, transparent 60%);
            animation: rotate-glow 4s linear infinite;
            z-index: -1;
        }

        .glow-content {
            background: #0a0a0a;
            border-radius: 26px;
            display: block;
        }

        @keyframes rotate-glow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinner { border: 3px solid #222; border-top: 3px solid #10b981; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 1024px) { .grid-layout { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .grid-layout { grid-template-columns: 1fr; } }

		/* В обычном браузере этот текст нам не нужен, поэтому прячем его */
.pdf-watermark {
    display: none;
}

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const WORKER_URL = "https://resumelink-worker.aisrail.workers.dev";

        function App() {
            const [resumeData, setResumeData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [loadingStage, setLoadingStage] = useState(0); 
            const [step, setStep] = useState('setup');
            const [savedId, setSavedId] = useState(null);

            const isEn = navigator.language.startsWith('en');
            const T = {
                en: {
                    mainTitle: "Transform your boring resume into a stylish interactive profile",
                    uploadBtn: "Upload Resume",
                    backBtn: "← Back",
                    atsScore: "ATS Score",
                    contact: "For cooperation:",
                    footerEng: "Empowering professionals with AI-driven visual storytelling.",
                    steps: [
                        { t: "UPLOAD", d: "Upload your file in any format." },
                        { t: "AI MAGIC", d: "AI structures data and calculates ATS." },
                        { t: "SHARE", d: "Get your link and personal QR code." }
                    ],
                    stages: ["Analyzing text...", "Extracting data...", "Generating blocks...", "Creating QR code...", "Optimizing mobile layout...", "Finalizing interactive elements...", "Almost ready..."]
                },
                ru: {
                    mainTitle: "Преврати скучное резюме в стильный интерактивный профиль",
                    uploadBtn: "Загрузить резюме",
                    backBtn: "← Назад",
                    atsScore: "ATS Score",
                    contact: "По вопросам сотрудничества:",
                    footerEng: "Empowering professionals with AI-driven visual storytelling.",
                    steps: [
                        { t: "ЗАГРУЗКА", d: "Загрузи файл в любом формате." },
                        { t: "AI МАГИЯ", d: "Нейросеть структурирует данные и считает ATS." },
                        { t: "ПОДЕЛИТЬСЯ", d: "Получи ссылку и личный QR-код." }
                    ],
                    stages: ["Анализируем текст...", "Извлекаем данные...", "Генерируем блоки...", "Создаём QR-код...", "Оптимизируем мобильную верстку...", "Настраиваем интерактив...", "Почти готово..."]
                }
            };

            const curr = isEn ? T.en : T.ru;

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                if (id) {
                    setLoading(true);
                    fetch(`${WORKER_URL}/${id}`).then(res => res.json()).then(data => {
                        setResumeData(data);
                        setSavedId(id);
                        setStep('result');
                        setLoading(false);
                    }).catch(() => setLoading(false));
                }
            }, []);

            useEffect(() => {
                let interval;
                if (loading) {
                    interval = setInterval(() => {
                        setLoadingStage(prev => (prev < curr.stages.length - 1 ? prev + 1 : prev));
                    }, 2500);
                }
                return () => clearInterval(interval);
            }, [loading, curr.stages.length]);

            const autoPublish = async (data) => {
                try {
                    const res = await fetch(WORKER_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                    const result = await res.json();
                    setSavedId(result.id);
                    const newUrl = `${window.location.origin}${window.location.pathname}?id=${result.id}`;
                    window.history.pushState({ path: newUrl }, '', newUrl);
                } catch (err) { console.error(err); }
            };

            const processAI = async (text) => {
                if (!text || text.trim().length < 20) {
                    alert(isEn ? "No readable text found" : "Текст не найден (возможно, это скан)");
                    setLoading(false);
                    return;
                }
                try {
                    const prompt = `Analyze text and extract into JSON. Target language: Use the same language as the source text. 
                    Task: Create a professional interactive profile. 
                    MANDATORY FOR NAME: If target language is English, format the "name" field as "First Name Last Name" only (omit patronymic). If Russian, keep full name.
                    MANDATORY FOR BLOCKS: If the text contains enough information, generate additional blocks in "additional" array (e.g., "Key Achievements", "Professional Strengths"). If no specific info exists, do NOT create it.
                    JSON structure: {
                        "labels": {"summary": "", "experience": "", "education": "", "contacts": "", "languages": "", "hobbies": "", "links": ""}, 
                        "name": "", "title": "", "contacts": {"p": "", "e": "", "l": ""}, 
                        "socials": {"li": "", "gh": "", "tg": ""}, "summary": "", "atsScore": 85, 
                        "experience": [{"c": "", "p": "", "t": "", "d": ""}], 
                        "education": [{"s": "", "d": "", "y": ""}], 
                        "languages": [], "hobbies": [], 
                        "additional": [{"title": "", "content": ""}]
                    }`;

                    const res = await fetch(`${WORKER_URL}/generate`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ prompt: prompt + " Text: " + text.substring(0, 9000) })
                    });

                    const data = await res.json();
                    if (data.error || !data.candidates || !data.candidates[0]) {
                        throw new Error(data.error?.message || "AI Error");
                    }

                    const rawText = data.candidates[0].content.parts[0].text;
                    const startIdx = rawText.indexOf('{');
                    const endIdx = rawText.lastIndexOf('}');
                    if (startIdx === -1 || endIdx === -1) throw new Error("Invalid JSON");
                    
                    const jsonStr = rawText.substring(startIdx, endIdx + 1);
                    const parsedData = JSON.parse(jsonStr);
                    
                    parsedData.experience = parsedData.experience || [];
                    parsedData.education = parsedData.education || [];
                    parsedData.additional = parsedData.additional || [];

                    setResumeData(parsedData);
                    await autoPublish(parsedData);
                    setStep('result');
                } catch (err) { 
                    console.error(err);
                    alert(isEn ? "Analysis error. Check Worker settings." : "Ошибка анализа. Проверьте настройки Воркера."); 
                }
                setLoading(false);
            };

            const handleFile = async (e) => {
                if (loading) return;
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                setLoadingStage(0);
                try {
                    let text = "";
                    const ext = file.name.split('.').pop().toLowerCase();
                    if (ext === "pdf") {
                        const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
                        for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(s => s.str).join(" ") + " ";
                        }
                    } else if (ext === "docx") {
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await window.mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                        text = result.value; 
                    } else if (ext === "txt") {
                        text = await file.text();
                    } else {
                        alert(isEn ? "Format not supported" : "Формат не поддерживается");
                        setLoading(false);
                        return;
                    }
                    await processAI(text);
                } catch (err) { 
                    console.error(err);
                    setLoading(false); 
                }
            };

            if (step === 'setup') return (
                <div className="max-w-4xl mx-auto px-4 py-20 text-center flex flex-col min-h-screen">
                    <div className="flex-grow">
                        <h1 className="text-6xl sm:text-8xl font-black mb-6 italic tracking-tighter inline-block bg-gradient-to-r from-emerald-400 to-blue-500 bg-clip-text text-transparent">ResumeLink</h1>
                        <p className="text-gray-400 mb-12 text-xl sm:text-2xl font-light italic">{curr.mainTitle}</p>
                        
                        <div className="inline-block mb-20">
                            {loading ? (
                                <div className="p-10 sm:p-20 bg-[#161616] border border-white/5 rounded-[40px] space-y-6">
                                    <div className="spinner mx-auto"></div>
                                    <p className="text-emerald-500 font-bold animate-pulse uppercase text-sm">{curr.stages[loadingStage]}</p>
                                </div>
                            ) : (
                                <div className="glow-wrapper">
                                    <div className="glow-content p-8 sm:p-20">
                                        <label className="bg-emerald-600 hover:bg-emerald-500 px-8 sm:px-16 py-6 rounded-2xl font-bold cursor-pointer inline-block text-lg shadow-xl transition-all">
                                            {curr.uploadBtn} <input type="file" onChange={handleFile} className="hidden" accept=".pdf,.docx,.txt" />
                                        </label>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">
                            {curr.steps.map((s, i) => (
                                <div key={i} className="bg-[#111] p-8 rounded-3xl border border-white/5">
                                    <div className="text-emerald-500 font-black mb-2 italic">0{i+1}</div>
                                    <h4 className="font-bold text-sm mb-2 uppercase tracking-widest">{s.t}</h4>
                                    <p className="text-gray-500 text-xs leading-relaxed">{s.d}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                    <footer className="mt-20 pt-10 border-t border-white/5 space-y-4">
                        <p className="text-gray-600 text-sm italic">{curr.footerEng}</p>
                        <div className="text-gray-500 text-[10px] uppercase tracking-widest font-bold">
    <a href="/about.html" className="hover:text-emerald-500 transition-colors mr-4 underline underline-offset-4">{isEn ? "About" : "О сервисе"}</a>
    {curr.contact} <a href="mailto:sarytopdev@gmail.com" className="text-emerald-500 ml-1">sarytopdev@gmail.com</a>
			</div>
                    </footer>
                </div>
            );

            const L = resumeData.labels || {};
            return (
                <div className="max-w-6xl mx-auto px-4 py-10 space-y-8">
                    <div className="flex justify-between items-center">
                        <h1 className="text-3xl font-black bg-gradient-to-r from-emerald-400 to-blue-500 bg-clip-text text-transparent italic">ResumeLink</h1>
                        <button onClick={() => {window.location.search=""; setStep('setup');}} className="text-gray-600 text-[10px] font-bold uppercase border border-white/5 px-5 py-2 rounded-full font-bold uppercase">{curr.backBtn}</button>
                    </div>
                    <div className="grid-layout">
                        <div className="card-item col-span-full flex flex-col md:flex-row justify-between items-center bg-[#111] p-10">
                            <div>
                                <h2 className="text-4xl md:text-[56px] name-fix tracking-tighter" contentEditable="true" suppressContentEditableWarning={true}>{resumeData.name}</h2>
                                <p className="text-emerald-400 font-bold uppercase tracking-widest text-[14px] mt-4">{resumeData.title}</p>
                            </div>
                            <div className="text-right">
                                <div className="text-emerald-500 text-2xl font-black">{resumeData.atsScore}%</div>
                                <p className="text-[12px] text-gray-500 uppercase font-bold">{curr.atsScore}</p>
                            </div>
                        </div>

                        {resumeData.summary && (
                            <div className="card-item col-span-1 md:col-span-3">
                                <h3 className="text-blue-400 text-[12px] font-bold uppercase mb-6 tracking-widest">{L.summary}</h3>
                                <p className="text-[22px] font-medium text-gray-200">{resumeData.summary}</p>
                            </div>
                        )}

                        <div className="card-item bg-blue-500/5 border-blue-500/20">
                            <h3 className="text-blue-400 text-[12px] font-bold uppercase mb-6 tracking-widest">{L.contacts}</h3>
                            <div className="space-y-4 text-[17px]">
                                {resumeData.contacts?.p && <p>📱 {resumeData.contacts.p}</p>}
                                {resumeData.contacts?.e && <p>✉️ {resumeData.contacts.e}</p>}
                                {resumeData.contacts?.l && <p>📍 {resumeData.contacts.l}</p>}
                            </div>
                        </div>

                        {resumeData.experience?.length > 0 && (
                            <div className="card-item col-span-1 md:col-span-3">
                                <h3 className="text-blue-400 text-[10px] font-bold uppercase mb-8 tracking-widest">{L.experience}</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    {resumeData.experience.map((ex, i) => (
                                        <div key={i} className="border-l-2 border-emerald-500/20 pl-5">
                                            <h4 className="font-bold text-[18px]">{ex.p}</h4>
                                            <p className="text-emerald-500 text-[14px] font-bold uppercase my-2">{ex.c} | {ex.t}</p>
                                            <p className="text-gray-400 text-[14px] leading-relaxed">{ex.d}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {resumeData.education?.length > 0 && (
                            <div className="card-item">
                                <h3 className="text-blue-400 text-[12px] font-bold uppercase mb-8 tracking-widest">{L.education}</h3>
                                <div className="space-y-6">
                                    {resumeData.education.map((ed, i) => (
                                        <div key={i} className="border-b border-white/5 pb-4 last:border-0">
                                            <p className="font-bold text-[17px]">{ed.d}</p>
                                            <p className="text-gray-400 text-[14px] mt-1">{ed.s} ({ed.y})</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {resumeData.additional?.map((block, i) => block?.title && (
                            <div key={i} className="card-item col-span-1 md:col-span-2">
                                <h3 className="text-blue-400 text-[12px] font-bold uppercase mb-6 tracking-widest">{block.title}</h3>
                                <p className="text-[16px] text-gray-300 leading-relaxed">{block.content}</p>
                            </div>
                        ))}

                        {(resumeData.languages?.length > 0 || resumeData.hobbies?.length > 0) && (
                            <div className="card-item">
                                {resumeData.languages?.length > 0 && (
                                    <div className="mb-8">
                                        <h3 className="text-blue-400 text-[12px] font-bold uppercase mb-4 tracking-widest">{L.languages}</h3>
                                        <p className="text-gray-300 text-sm">{resumeData.languages.join(", ")}</p>
                                    </div>
                                )}
                                {resumeData.hobbies?.length > 0 && (
                                    <div>
                                        <h3 className="text-blue-400 text-[12px] font-bold uppercase mb-4 tracking-widest">{L.hobbies}</h3>
                                        <p className="text-gray-300 text-sm">{resumeData.hobbies.join(", ")}</p>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="card-item col-span-1 md:col-span-2 flex items-center justify-between bg-gradient-to-br from-[#111] to-[#1a1a1a]">
                            <div className="space-y-4 w-full">
                                <h3 className="text-blue-400 text-[12px] font-bold uppercase tracking-widest">{L.links}</h3>
                                <div className="flex gap-3 text-2xl">
                                    <a href={resumeData.socials?.li || "#"} target="_blank">🔗</a>
                                    <a href={resumeData.socials?.gh || "#"} target="_blank">🐙</a>
                                    <a href={resumeData.socials?.tg || "#"} target="_blank">✈️</a>
                                </div>
                            </div>
                            <div className="bg-white p-2 rounded-2xl shrink-0">
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=${encodeURIComponent(window.location.href)}`} alt="QR" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

<div class="no-print">
    <button id="share-button" class="share-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
      <span>Share Profile</span>
    </button>

    <button id="download-button" onclick="window.print()" class="download-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      <span>Download PDF</span>
    </button>
</div>

<footer class="rl-site-footer no-print">
    <p>&copy; 2026 ResumeLink | <a href="/policy.html" style="color: #10b981; text-decoration: none;">Privacy & Terms</a></p>
    <div style="margin-top: 10px; color: #444;">
        Built with <a href="https://resumelink.cc" style="color: #10b981; text-decoration: none; font-weight: bold;">ResumeLink.cc</a> — AI mobile-first resumes
    </div>
</footer>

<div class="pdf-watermark">
    Created via ResumeLink.cc — Interactive mobile version available online
</div>

<style>
  /* СТИЛИ ДЛЯ САЙТА (оставляем для красоты кнопок) */
  .share-btn, .download-btn {
    position: fixed; right: 20px; z-index: 1000; align-items: center; gap: 8px;
    color: white; padding: 12px 24px; border-radius: 50px; border: none;
    font-weight: 600; cursor: pointer; transition: transform 0.2s, background 0.2s;
    font-family: 'Outfit', sans-serif; display: none;
  }
  .share-btn { bottom: 20px; background: #10b981; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
  .download-btn { bottom: 80px; background: #3b82f6; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
  .rl-site-footer { margin-top: 60px; text-align: center; padding: 40px 20px; font-size: 14px; color: #666; border-top: 1px solid #1a1a1a; }

  /* УЛЬТРА-ОПТИМИЗАЦИЯ ДЛЯ PDF */
  @media print {
    /* 1. Настройка страницы: убираем браузерные даты, URL и заголовки */
    @page {
      margin: 15mm 10mm;
      size: auto; /* Это поможет браузеру скрыть свои колонтитулы */
    }

    body {
      background: white !important;
      color: #1a1a1a !important;
      font-size: 10pt !important;
      line-height: 1.2 !important;
      -webkit-print-color-adjust: exact !important;
    }

    /* 2. ЖЕСТКО СКРЫВАЕМ ТЕХНИЧЕСКИЙ МУСОР (Back, заголовок, даты) */
    .no-print, .share-btn, .download-btn, .rl-site-footer, 
    button, header, h1.bg-gradient-to-r, .text-gray-600, 
    [onclick*="window.location.search"] { 
      display: none !important; 
    }

    /* 3. УБИРАЕМ ПУСТОТУ: верстка в две колонки */
    .grid-layout {
      display: block !important;
      column-count: 2;
      column-gap: 20px;
    }

    /* Имя и Summary на всю ширину сверху */
    .col-span-full, .md\:col-span-3 {
      column-span: all;
      margin-bottom: 15px;
      width: 100% !important;
    }

    .card-item {
      background: white !important;
      border: 0.5pt solid #eee !important;
      border-radius: 8px !important;
      padding: 12px !important;
      margin-bottom: 10px !important;
      page-break-inside: avoid;
      box-shadow: none !important;
    }

    /* Улучшаем читаемость */
    .text-gray-200, .text-gray-300, .text-gray-400, .text-gray-500 { color: #333 !important; }
    h2 { font-size: 22pt !important; color: black !important; margin: 0 !important; }
    h3 { font-size: 9pt !important; color: #3b82f6 !important; border-bottom: 0.5pt solid #eee; padding-bottom: 2px; }

    /* 4. Чистая ватермарка внизу */
    .pdf-watermark {
      display: block !important;
      position: fixed;
      bottom: -10mm;
      left: 0;
      right: 0;
      font-size: 8pt;
      color: #aaa !important;
      text-align: center;
      border-top: 0.5pt solid #eee;
      padding-top: 5px;
    }
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const shareBtn = document.getElementById('share-button');
    const downloadBtn = document.getElementById('download-button');
    const urlParams = new URLSearchParams(window.location.search);
    const hasId = urlParams.has('id');

    // Показываем кнопки управления, только если резюме создано (есть ID)
    if (hasId) {
        shareBtn.style.display = 'flex';
        downloadBtn.style.display = 'flex';
    }

    // Логика кнопки Share
    shareBtn.addEventListener('click', async () => {
        const shareData = {
            title: 'ResumeLink Profile',
            text: 'Оцени моё интерактивное резюме!',
            url: window.location.href
        };
        try {
            if (navigator.share) {
                await navigator.share(shareData);
            } else {
                await navigator.clipboard.writeText(window.location.href);
                const span = shareBtn.querySelector('span');
                span.innerText = 'Link Copied!';
                setTimeout(() => { span.innerText = 'Share Profile'; }, 2000);
            }
        } catch (err) { console.error('Error:', err); }
    });
});
</script>
