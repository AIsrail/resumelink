title: ResumeLink
url: "https://resumelink.cc"
baseurl: ""

# Указываем Jekyll заходить в папку role
include: [role]

# Делаем ссылки красивыми (без .html на конце)
permalink: /:path/

defaults:
  - scope:
      path: "role" # Применяем настройки ко всем файлам в папке role
    values:
      layout: "role" # Используем файл _layouts/role.html
