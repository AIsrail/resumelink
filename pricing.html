<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing — ResumeLink</title>
    <meta name="description" content="Simple pricing for ResumeLink. Start free, upgrade when ready.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <style>
        :root{--green:#1DB368;--green-dk:#0D8A4E;--forest:#0D3D28;--bg:#F2FAF6;--surface:#FFFFFF;--mint:#EAF7F0;--border:#C5E8D5;--text:#0D3D28;--muted:#5A8A70;--faint:#A8CDB9}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
        nav{position:sticky;top:0;z-index:100;background:rgba(242,250,246,0.92);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);padding:0 clamp(1.5rem,5vw,4rem);height:62px;display:flex;align-items:center;justify-content:space-between}
        .nav-logo{font-size:20px;font-weight:500;color:var(--forest);letter-spacing:-0.03em;text-decoration:none}
        .nav-logo span{color:var(--green)}
        .nav-links{display:flex;align-items:center;gap:24px}
        .nav-links a{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s}
        .nav-links a:hover{color:var(--forest)}
        .nav-active{color:var(--forest)!important;font-weight:500!important}
        .nav-cta{background:var(--forest);color:var(--bg)!important;padding:8px 18px;border-radius:8px;font-weight:500!important;transition:background .2s!important}
        .nav-cta:hover{background:var(--green-dk)!important}
        .nav-hamburger{display:none;cursor:pointer;flex-direction:column;gap:4px;background:none;border:none;padding:4px}
        .nav-hamburger span{width:20px;height:1.5px;background:var(--forest);border-radius:2px;display:block}
        .nav-mobile{display:none;position:absolute;top:62px;left:0;right:0;background:var(--bg);border-bottom:0.5px solid var(--border);padding:1rem 1.5rem;flex-direction:column;gap:16px;z-index:99}
        .nav-mobile a{font-size:14px;color:var(--muted);text-decoration:none}
        .nav-mobile.open{display:flex}
        .page-wrap{max-width:800px;margin:0 auto;padding:clamp(3rem,6vw,5rem) clamp(1.5rem,5vw,2rem)}
        .pricing-hero{text-align:center;margin-bottom:3rem}
        .pricing-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--green-dk);background:var(--mint);border:0.5px solid var(--border);padding:5px 12px;border-radius:20px;margin-bottom:16px}
        .pricing-eyebrow::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%}
        .pricing-h1{font-size:clamp(2rem,4vw,3rem);font-weight:300;color:var(--forest);letter-spacing:-0.025em;line-height:1.2;margin-bottom:12px}
        .pricing-h1 b{font-weight:500}
        .pricing-h1 em{font-family:'Instrument Serif',serif;font-style:italic;color:var(--green)}
        .pricing-sub{font-size:15px;color:var(--muted);line-height:1.65}
        .plans-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:3rem;align-items:start}
        .plan-card{background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:28px 24px;position:relative}
        .plan-card.featured{background:var(--forest);border-color:var(--forest)}
        .popular-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:10px;font-weight:500;padding:4px 14px;border-radius:20px;white-space:nowrap;text-transform:uppercase;letter-spacing:.08em}
        .plan-badge{display:inline-block;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border-radius:20px;margin-bottom:14px}
        .plan-card:not(.featured) .plan-badge{background:var(--mint);color:var(--green-dk)}
        .plan-card.featured .plan-badge{background:rgba(29,179,104,0.2);color:var(--green)}
        .plan-name{font-size:20px;font-weight:500;color:var(--forest);margin-bottom:6px}
        .plan-card.featured .plan-name{color:#fff}
        .plan-price{margin-bottom:6px;display:flex;align-items:baseline;gap:4px}
        .plan-price-n{font-size:42px;font-weight:300;color:var(--forest);letter-spacing:-0.03em;line-height:1}
        .plan-card.featured .plan-price-n{color:#fff}
        .plan-price-per{font-size:13px;color:var(--muted)}
        .plan-card.featured .plan-price-per{color:rgba(255,255,255,0.5)}
        .plan-desc{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.55}
        .plan-card.featured .plan-desc{color:rgba(255,255,255,0.55)}
        .plan-divider{border:none;border-top:0.5px solid var(--border);margin-bottom:18px}
        .plan-card.featured .plan-divider{border-color:rgba(255,255,255,0.1)}
        .plan-features{list-style:none;margin-bottom:24px}
        .plan-features li{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--muted);padding:6px 0;border-bottom:0.5px solid var(--border);line-height:1.4}
        .plan-card.featured .plan-features li{color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.08)}
        .plan-features li:last-child{border-bottom:none}
        .check{color:var(--green);font-size:13px;flex-shrink:0;margin-top:1px}
        .cross{color:var(--faint);font-size:13px;flex-shrink:0;margin-top:1px}
        .plan-btn{display:block;text-align:center;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:500;text-decoration:none;transition:background .2s,transform .15s}
        .btn-free{background:var(--mint);color:var(--forest);border:0.5px solid var(--border)}
        .btn-free:hover{background:var(--border)}
        .btn-pro{background:var(--green);color:#fff}
        .btn-pro:hover{background:var(--green-dk);transform:translateY(-1px)}
        .faq-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:16px}
        .faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2rem}
        .faq-item{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:18px 20px}
        .faq-q{font-size:13px;font-weight:500;color:var(--forest);margin-bottom:7px}
        .faq-a{font-size:12px;color:var(--muted);line-height:1.65}
        .kofi-block{text-align:center;padding:2rem;background:var(--surface);border:0.5px solid var(--border);border-radius:16px;margin-bottom:3rem}
        .kofi-btn{display:inline-flex;align-items:center;gap:8px;background:#FF5E5B;color:#fff;padding:11px 24px;border-radius:10px;font-size:14px;font-weight:500;text-decoration:none;transition:opacity .2s}
        .kofi-btn:hover{opacity:.85}
        footer{border-top:0.5px solid var(--border);padding:2rem clamp(1.5rem,5vw,4rem);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;max-width:1200px;margin:0 auto}
        .footer-logo{font-size:15px;font-weight:500;color:var(--forest);text-decoration:none;letter-spacing:-0.02em}
        .footer-logo span{color:var(--green)}
        .footer-links{display:flex;gap:20px;flex-wrap:wrap}
        .footer-links a{font-size:12px;color:var(--faint);text-decoration:none;transition:color .2s}
        .footer-links a:hover{color:var(--forest)}
        .footer-copy{font-size:11px;color:var(--faint)}
        @media(max-width:640px){.plans-grid{grid-template-columns:1fr}.faq-grid{grid-template-columns:1fr}.nav-links{display:none}.nav-hamburger{display:flex}footer{flex-direction:column;gap:12px}}
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">Resume<span>Link</span></a>
    <div class="nav-links">
        <a href="/roles/" id="nav-explore">Explore</a>
        <a href="/about.html" id="nav-about">About</a>
        <a href="/pricing.html" id="nav-pricing" class="nav-active">Pricing</a>
        <a href="mailto:info@resumelink.cc" id="nav-contact">Contact</a>
        <a href="/" class="nav-cta" id="nav-upload">Upload →</a>
    </div>
    <button class="nav-hamburger" onclick="document.querySelector('.nav-mobile').classList.toggle('open')" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</nav>
<div class="nav-mobile">
    <a href="/roles/" id="mob-explore">Explore</a>
    <a href="/about.html" id="mob-about">About</a>
    <a href="/pricing.html" id="mob-pricing" style="color:var(--green-dk);font-weight:500">Pricing</a>
    <a href="mailto:info@resumelink.cc" id="mob-contact">Contact</a>
    <a href="/" id="mob-upload" style="color:var(--green-dk);font-weight:500">Upload →</a>
</div>

<div class="page-wrap">
    <div class="pricing-hero">
        <div class="pricing-eyebrow" id="eyebrow">Simple pricing</div>
        <h1 class="pricing-h1" id="hero-title">Start free.<br>Upgrade when <em>ready.</em></h1>
        <p class="pricing-sub" id="hero-sub">No hidden fees. Cancel anytime.</p>
    </div>
    <div class="plans-grid" id="plansGrid"></div>
    <div class="faq-label" id="faq-label">Frequently asked questions</div>
    <div class="faq-grid" id="faqGrid"></div>
    <div class="kofi-block" id="kofi-block"></div>
</div>

<footer>
    <a href="/" class="footer-logo">Resume<span>Link</span></a>
    <div class="footer-links">
        <a href="/roles/" id="footer-explore">Explore</a>
        <a href="/about.html" id="footer-about">About</a>
        <a href="/pricing.html" id="footer-pricing">Pricing</a>
        <a href="/policy.html" id="footer-policy">Privacy & Terms</a>
        <a href="mailto:info@resumelink.cc">info@resumelink.cc</a>
    </div>
    <div class="footer-copy">© 2026 ResumeLink</div>
</footer>

<script>
// Auto-activate Pro if coming from Lemon Squeezy redirect
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('pro') === 'activated') {
    localStorage.setItem('rl_pro', 'true');
    window.history.replaceState({}, '', window.location.pathname);
}

const isEn = navigator.language.startsWith('en');

const T = {
    en: {
        eyebrow: 'Simple pricing',
        heroTitle: 'Start free.<br>Upgrade when <em>ready.</em>',
        heroSub: 'No hidden fees. Cancel anytime.',
        navExplore:'Explore', navAbout:'About', navPricing:'Pricing',
        navContact:'Contact', navUpload:'Upload →',
        footerAbout:'About', footerPolicy:'Privacy & Terms', footerPricing:'Pricing',
        faqLabel: 'Frequently asked questions',
        popular: 'Most Popular',
        kofi: {
            title: 'Like what we\'re building?',
            sub: 'Buy us a coffee — it helps keep ResumeLink free for everyone.',
            btn: '☕ Buy a coffee'
        },
        plans: [
            {
                badge:'Free', name:'Starter',
                price:'$0', per:'/ forever',
                desc:'Everything you need to get started.',
                btn:'Get Started Free', btnClass:'btn-free', btnHref:'/',
                features:[
                    {ok:true,  text:'Up to 3 AI-generated profiles'},
                    {ok:true,  text:'ATS Score'},
                    {ok:true,  text:'Shareable link & QR code'},
                    {ok:true,  text:'PDF download (with watermark)'},
                    {ok:false, text:'Standard URL only (/?id=xxx)'},
                    {ok:false, text:'No watermark removal'},
                    {ok:false, text:'Basic ATS overview only'},
                ]
            },
            {
                badge:'Pro', name:'Professional', featured:true, popular:true,
                price:'$5', per:'/ month',
                desc:'For professionals who want to stand out and own their brand.',
                btn:'Upgrade to Pro →', btnClass:'btn-pro',
                btnHref:'https://resumelink.lemonsqueezy.com/checkout/buy/1b9011cf-d233-43ce-afa6-f817201f24a6?redirect_url=https://resumelink.cc/pricing.html?pro=activated',
                features:[
                    {ok:true, text:'Up to 50 AI-generated profiles'},
                    {ok:true, text:'No watermark on PDF'},
                    {ok:true, text:'Custom link: resumelink.cc/yourname'},
                    {ok:true, text:'Detailed ATS breakdown'},
                    {ok:true, text:'2 PDF color themes'},
                    {ok:true, text:'Priority AI processing'},
                ]
            }
        ],
        faqs:[
            {q:'Can I cancel anytime?', a:'Yes, absolutely. Cancel your subscription at any time from your Lemon Squeezy account. No questions asked.'},
            {q:'What happens to my profiles if I cancel?', a:'Your profiles stay accessible via their links. You just lose Pro features like the custom URL and watermark removal.'},
            {q:'How does the custom link work?', a:'After upgrading, email us at info@resumelink.cc with your desired slug and we\'ll set it up within 24 hours.'},
            {q:'Is my resume data safe?', a:'Yes. Files are processed in your browser. We don\'t store your uploaded PDFs on our servers.'},
        ]
    },
    ru: {
        eyebrow: 'Простые тарифы',
        heroTitle: 'Начни бесплатно.<br>Улучши когда <em>будешь готов.</em>',
        heroSub: 'Никаких скрытых платежей. Отмена в любой момент.',
        navExplore:'Explore', navAbout:'О сервисе', navPricing:'Тарифы',
        navContact:'Контакт', navUpload:'Загрузить →',
        footerAbout:'О сервисе', footerPolicy:'Политика', footerPricing:'Тарифы',
        faqLabel: 'Часто задаваемые вопросы',
        popular: 'Популярный',
        kofi: {
            title: 'Нравится что мы делаем?',
            sub: 'Угости нас кофе — это помогает держать ResumeLink бесплатным для всех.',
            btn: '☕ Угостить кофе'
        },
        plans: [
            {
                badge:'Бесплатно', name:'Старт',
                price:'$0', per:'/ навсегда',
                desc:'Всё что нужно для начала.',
                btn:'Начать бесплатно', btnClass:'btn-free', btnHref:'/',
                features:[
                    {ok:true,  text:'До 3 AI-профилей (резюме)'},
                    {ok:true,  text:'ATS Score'},
                    {ok:true,  text:'Ссылка и QR-код'},
                    {ok:true,  text:'Скачать PDF (с watermark)'},
                    {ok:false, text:'Только стандартная ссылка (/?id=xxx)'},
                    {ok:false, text:'Нельзя убрать watermark'},
                    {ok:false, text:'Только базовый ATS'},
                ]
            },
            {
                badge:'Pro', name:'Профессионал', featured:true, popular:true,
                price:'$5', per:'/ мес',
                desc:'Для профессионалов, которые хотят выделиться.',
                btn:'Улучшить до Pro →', btnClass:'btn-pro',
                btnHref:'https://resumelink.lemonsqueezy.com/checkout/buy/1b9011cf-d233-43ce-afa6-f817201f24a6?redirect_url=https://resumelink.cc/pricing.html?pro=activated',
                features:[
                    {ok:true, text:'До 50 AI-профилей (резюме)'},
                    {ok:true, text:'Без watermark в PDF'},
                    {ok:true, text:'Именная ссылка: resumelink.cc/yourname'},
                    {ok:true, text:'Детальный ATS анализ'},
                    {ok:true, text:'2 цветовые темы PDF'},
                    {ok:true, text:'Приоритетная AI обработка'},
                ]
            }
        ],
        faqs:[
            {q:'Можно отменить в любое время?', a:'Да. Отмени подписку в любой момент через Lemon Squeezy. Без вопросов.'},
            {q:'Что будет с профилями после отмены?', a:'Профили остаются доступными по ссылкам. Ты просто теряешь Pro функции — именную ссылку и убранный watermark.'},
            {q:'Как работает именная ссылка?', a:'После покупки напиши на info@resumelink.cc с желаемым слагом — настроим в течение 24 часов.'},
            {q:'Мои данные в безопасности?', a:'Да. Файлы обрабатываются в браузере. Мы не храним загруженные PDF на серверах.'},
        ]
    }
};

const C = isEn ? T.en : T.ru;

// Nav labels
const navMap = {
    'nav-explore':C.navExplore, 'nav-about':C.navAbout, 'nav-pricing':C.navPricing,
    'nav-contact':C.navContact, 'nav-upload':C.navUpload,
    'mob-explore':C.navExplore, 'mob-about':C.navAbout, 'mob-pricing':C.navPricing,
    'mob-contact':C.navContact, 'mob-upload':C.navUpload,
    'footer-explore':C.navExplore, 'footer-about':C.footerAbout,
    'footer-pricing':C.footerPricing, 'footer-policy':C.footerPolicy
};
Object.entries(navMap).forEach(([id,txt]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = txt;
});

// Hero
document.getElementById('eyebrow').textContent = C.eyebrow;
document.getElementById('hero-title').innerHTML = C.heroTitle;
document.getElementById('hero-sub').textContent = C.heroSub;
document.getElementById('faq-label').textContent = C.faqLabel;

// Plans
document.getElementById('plansGrid').innerHTML = C.plans.map(plan => `
    <div class="plan-card ${plan.featured ? 'featured' : ''}">
        ${plan.popular ? `<div class="popular-badge">✦ ${C.popular}</div>` : ''}
        <div class="plan-badge">${plan.badge}</div>
        <div class="plan-name">${plan.name}</div>
        <div class="plan-price">
            <span class="plan-price-n">${plan.price}</span>
            <span class="plan-price-per">${plan.per}</span>
        </div>
        <div class="plan-desc">${plan.desc}</div>
        <hr class="plan-divider">
        <ul class="plan-features">
            ${plan.features.map(f => `
                <li><span class="${f.ok ? 'check' : 'cross'}">${f.ok ? '✓' : '✗'}</span>${f.text}</li>
            `).join('')}
        </ul>
        <a href="${plan.btnHref}" class="plan-btn ${plan.btnClass}" ${plan.btnHref.startsWith('http') ? 'target="_blank"' : ''}>${plan.btn}</a>
    </div>
`).join('');

// FAQ
document.getElementById('faqGrid').innerHTML = C.faqs.map(f => `
    <div class="faq-item">
        <div class="faq-q">${f.q}</div>
        <div class="faq-a">${f.a}</div>
    </div>
`).join('');

// Ko-fi block
document.getElementById('kofi-block').innerHTML = `
    <div style="font-size:28px;margin-bottom:10px">☕</div>
    <div style="font-size:16px;font-weight:500;color:var(--forest);margin-bottom:6px">${C.kofi.title}</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6;max-width:400px;margin-left:auto;margin-right:auto">${C.kofi.sub}</div>
    <a href="https://ko-fi.com/ontoguzlabs" target="_blank" class="kofi-btn">${C.kofi.btn}</a>
`;
</script>
</body>
</html>
