function App() {
  const [resumeData, setResumeData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingStage, setLoadingStage] = useState(0);
  const [step, setStep] = useState('setup');

  const isEn = navigator.language.startsWith('en');
  const C = isEn ? T.en : T.ru;

  // update nav & button labels
  useEffect(() => {
    const map = {
      'nav-roles': C.navRoles, 'nav-about': C.navAbout,
      'nav-pricing': isEn ? 'Pricing' : 'Тарифы',
      'nav-contact': C.navContact, 'nav-upload': C.navUpload,
      'mob-roles': C.navRoles, 'mob-about': C.navAbout,
      'mob-pricing': isEn ? 'Pricing' : 'Тарифы',
      'mob-contact': C.navContact, 'mob-upload': C.navUpload,
      'share-label': C.shareLabel, 'download-label': C.downloadLabel
    };
    Object.entries(map).forEach(([id, txt]) => { const el = document.getElementById(id); if (el) el.textContent = txt; });
  }, []);

  // load from ?id=
  useEffect(() => {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) return;
    setLoading(true);
    fetch(`${WORKER_URL}/${id}`)
      .then(r => r.json())
      .then(data => {
        setResumeData(data);
        if (window.__RL_SET_RESUME_DATA__) window.__RL_SET_RESUME_DATA__(data);
        setStep('result'); setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  // loading ticker
  useEffect(() => {
    if (!loading) return;
    const iv = setInterval(() => setLoadingStage(p => p < C.stages.length - 1 ? p + 1 : p), 2500);
    return () => clearInterval(iv);
  }, [loading]);

  const autoPublish = async (data) => {
    try {
      const r = await fetch(WORKER_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
      const res = await r.json();
      window.history.pushState({}, '', `${location.origin}${location.pathname}?id=${res.id}`);
    } catch(e) { console.error(e); }
  };

  const processAI = async (text) => {
    if (!text || text.trim().length < 20) {
      alert(isEn ? "No readable text found" : "Текст не найден (возможно, это скан)");
      setLoading(false); return;
    }
    try {
      const prompt = `Analyze text and extract into JSON. Target language: Use the same language as the source text.
Task: Create a professional interactive profile.
MANDATORY FOR NAME: If English — "First Last" only. If Russian — keep full name.
MANDATORY FOR BLOCKS: Generate additional blocks only if info exists.
JSON: {"labels":{"summary":"","experience":"","education":"","contacts":"","languages":"","hobbies":"","links":""},"name":"","title":"","contacts":{"p":"","e":"","l":""},"socials":{"li":"","gh":"","tg":""},"summary":"","atsScore":85,"experience":[{"c":"","p":"","t":"","d":""}],"education":[{"s":"","d":"","y":""}],"languages":[],"hobbies":[],"additional":[{"title":"","content":""}]}`;
      const r = await fetch(`${WORKER_URL}/generate`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ prompt: prompt + " Text: " + text.substring(0,9000) })
      });
      const data = await r.json();
      if (data.error || !data.candidates?.[0]) throw new Error(data.error?.message || "AI Error");
      const raw = data.candidates[0].content.parts[0].text;
      const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
      if (s === -1 || e === -1) throw new Error("Invalid JSON");
      const parsed = JSON.parse(raw.substring(s, e+1));
      parsed.experience = parsed.experience || [];
      parsed.education  = parsed.education  || [];
      parsed.additional = parsed.additional || [];
      setResumeData(parsed);
      if (window.__RL_SET_RESUME_DATA__) window.__RL_SET_RESUME_DATA__(parsed);
      await autoPublish(parsed);
      setStep('result');
      // +1 к счётчику профилей
      const cur = parseInt(localStorage.getItem('rl_count') || '0');
      localStorage.setItem('rl_count', String(cur + 1));
    } catch(err) {
      console.error(err);
      alert(isEn ? "Analysis error. Check Worker settings." : "Ошибка анализа. Проверьте настройки Воркера.");
    }
    setLoading(false);
  };

  const handleFile = async (ev) => {
    if (loading) return;
    const file = ev.target.files[0]; if (!file) return;

    // Check profile limit for free users
    const isPro = localStorage.getItem('rl_pro') === 'true';
    const count = parseInt(localStorage.getItem('rl_count') || '0');
    if (!isPro && count >= 3) {
        alert(isEn
            ? 'Free limit reached (3 profiles). Upgrade to Pro for up to 50 profiles.'
            : 'Достигнут лимит бесплатных профилей (3). Улучши до Pro для создания до 50 профилей.'
        );
        window.location.href = '/pricing.html';
        return;
    }

    setLoading(true); setLoadingStage(0);
    try {
      let text = "";
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext === "pdf") {
        const pdf = await pdfjs.getDocument({ data: await file.arrayBuffer() }).promise;
        for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(s => s.str).join(" ") + " ";
        }
      } else if (ext === "docx") {
        const res = await window.mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
        text = res.value;
      } else if (ext === "txt") {
        text = await file.text();
      } else {
        alert(isEn ? "Format not supported" : "Формат не поддерживается");
        setLoading(false); return;
      }
      await processAI(text);
    } catch(err) { console.error(err); setLoading(false); }
  };

  /* ── LANDING ── */
  if (step === 'setup') return (
    <div>
      <section id="hero">
        <div>
          <div className="hero-eyebrow">{C.eyebrow}</div>
          <h1>{C.h1a}<br/><em>{C.h1em}</em><br/>{C.h1b} <b>{C.h1c}</b></h1>
          <p className="hero-sub">{C.sub}</p>
          <div className="hero-actions">
            {loading ? (
              <div className="loading-box">
                <div className="spinner"></div>
                <div className="loading-stage">{C.stages[loadingStage]}</div>
              </div>
            ) : (
              <div className="glow-wrapper">
                <div className="glow-content">
                  <label className="btn-primary" style={{fontSize:'15px',padding:'14px 32px',cursor:'pointer'}}>
                    📄 {C.uploadBtn}
                    <input type="file" onChange={handleFile} style={{display:'none'}} accept=".pdf,.docx,.txt"/>
                  </label>
                </div>
              </div>
            )}
            {!loading && <a href="#how" className="btn-ghost">{C.howLink}</a>}
          </div>
          <p className="hero-note">{C.heroNote}</p>
        </div>
        <div className="hero-visual">
          <div className="float-chip chip-top">{C.chipTop}</div>
          <div className="profile-preview">
            <div className="pp-header">
              <div className="pp-avatar">AK</div>
              <div>
                <div className="pp-name">{C.previewName}</div>
		<div className="pp-role">{C.previewRole}</div>
              </div>
              <div className="pp-score">
                <div className="pp-score-n">92%</div>
                <div className="pp-score-l">{C.atsLabel}</div>
              </div>
            </div>
            <div className="pp-bar-row"><span>{C.skillsMatch}</span><span>88%</span></div>
            <div className="pp-bar-track"><div className="pp-bar-fill" style={{width:'88%'}}></div></div>
            <div className="pp-bar-row"><span>{C.keywords}</span><span>94%</span></div>
            <div className="pp-bar-track"><div className="pp-bar-fill" style={{width:'94%'}}></div></div>
            <div className="pp-tags">
              <span className="pp-tag">GPT-4</span><span className="pp-tag">Figma</span>
              <span className="pp-tag">SQL</span><span className="pp-tag">Agile</span>
            </div>
            <div className="pp-url">resumelink.cc/?id=a7k9x</div>
          </div>
          <div className="float-chip chip-bot">{C.chipBot}</div>
        </div>
      </section>

      <div id="stats">
        <div className="stats-inner">
          {C.stats.map(([n,l],i) => (
            <div key={i} className="stat-item">
              <div className="stat-n"><em>{n}</em></div>
              <div className="stat-l">{l}</div>
            </div>
          ))}
        </div>
      </div>

      <section id="features">
        <div className="section-label">{C.featLabel}</div>
        <h2 className="section-title">{C.featH1}<br/><b>{C.featH2}</b></h2>
        <p className="section-sub">{C.featSub}</p>
        <div className="features-grid">
          {C.feats.map((f,i) => (
            <div key={i} className="feature-card">
              <div className="feat-icon">{f.i}</div>
              <div className="feat-title">{f.t}</div>
              <div className="feat-desc">{f.d}</div>
            </div>
          ))}
        </div>
      </section>

      <section id="how">
        <div className="how-inner">
          <div className="section-label">{C.howLabel}</div>
          <h2 className="section-title">{C.howH1}<br/><b>{C.howH2}</b></h2>
          <p className="section-sub">{C.howSub}</p>
          <div className="steps-grid">
            {C.steps.map((s,i) => (
              <div key={i} className="step-card">
                <div className="step-num">{s.n}</div>
                <div className="step-title">{s.t}</div>
                <div className="step-desc">{s.d}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <footer className="site-footer">
        <a href="/" className="footer-logo">Resume<span>Link</span></a>
        <div className="footer-links">
          <a href="/about.html">{C.footerAbout}</a>
          <a href="/roles/">{C.footerRoles}</a>
          <a href="/policy.html">{C.footerPolicy}</a>
          <a href="mailto:info@resumelink.cc">info@resumelink.cc</a>
        </div>
        <div className="footer-copy">© 2026 ResumeLink</div>
      </footer>
    </div>
  );

  /* ── RESULT ── */
  const L = resumeData.labels || {};
  return (
    <div className="result-wrap">
      <div className="result-topbar">
        <a href="/" className="result-logo">Resume<span>Link</span></a>
        <button className="back-btn" onClick={() => { window.history.pushState({},'',location.pathname); setStep('setup'); setResumeData(null); }}>
          {C.backBtn}
        </button>
      </div>
      <div className="rl-grid">
        <div className="card card-hero">
          <div>
            <div className="resume-name" contentEditable suppressContentEditableWarning>{resumeData.name}</div>
            <div className="resume-title">{resumeData.title}</div>
          </div>
          <div className="ats-block">
            <div className="ats-num">{resumeData.atsScore}%</div>
            <div className="ats-lbl">{C.atsLabel}</div>
          </div>
        </div>

        {resumeData.summary && (
          <div className="card card-summary">
            <div className="card-label">{L.summary}</div>
            <p>{resumeData.summary}</p>
          </div>
        )}

        <div className="card card-contacts">
          <div className="card-label">{L.contacts}</div>
          {resumeData.contacts?.p && <div className="contact-row">📱 {resumeData.contacts.p}</div>}
          {resumeData.contacts?.e && <div className="contact-row">✉️ {resumeData.contacts.e}</div>}
          {resumeData.contacts?.l && <div className="contact-row">📍 {resumeData.contacts.l}</div>}
        </div>

        {resumeData.experience?.length > 0 && (
          <div className="card card-exp">
            <div className="card-label">{L.experience}</div>
            <div className="exp-grid">
              {resumeData.experience.map((ex,i) => (
                <div key={i} className="exp-item">
                  <div className="exp-pos">{ex.p}</div>
                  <div className="exp-co">{ex.c} · {ex.t}</div>
                  <div className="exp-desc">{ex.d}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {resumeData.education?.length > 0 && (
          <div className="card card-edu">
            <div className="card-label">{L.education}</div>
            {resumeData.education.map((ed,i) => (
              <div key={i} className="edu-item">
                <div className="edu-deg">{ed.d}</div>
                <div className="edu-school">{ed.s}</div>
                <div className="edu-year">{ed.y}</div>
              </div>
            ))}
          </div>
        )}

        {resumeData.additional?.map((block,i) => block?.title && (
          <div key={i} className="card card-additional">
            <div className="card-label">{block.title}</div>
            <p>{block.content}</p>
          </div>
        ))}

        {(resumeData.languages?.length > 0 || resumeData.hobbies?.length > 0) && (
          <div className="card card-misc">
            {resumeData.languages?.length > 0 && (
              <div className="misc-section">
                <div className="card-label">{L.languages}</div>
                <div className="tag-row">{resumeData.languages.map((l,i) => <span key={i} className="rl-tag">{l}</span>)}</div>
              </div>
            )}
            {resumeData.hobbies?.length > 0 && (
              <div className="misc-section">
                <div className="card-label">{L.hobbies}</div>
                <div className="tag-row">{resumeData.hobbies.map((h,i) => <span key={i} className="rl-tag">{h}</span>)}</div>
              </div>
            )}
          </div>
        )}

        <div className="card card-links">
          <div>
            <div className="card-label">{L.links}</div>
            <div className="social-row">
              <a href={resumeData.socials?.li || "#"} target="_blank">🔗</a>
              <a href={resumeData.socials?.gh || "#"} target="_blank">🐙</a>
              <a href={resumeData.socials?.tg || "#"} target="_blank">✈️</a>
            </div>
            <div className="share-url">{location.href}</div>
          </div>
          <div className="qr-wrap">
            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=${encodeURIComponent(location.href)}`} alt="QR" style={{display:'block',width:'72px',height:'72px'}}/>
          </div>
        </div>
      </div>

{/* PRO UPGRADE BLOCK */}
<div style={{background:'var(--forest)',borderRadius:'20px',padding:'28px 32px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'2rem',flexWrap:'wrap',marginTop:'2rem'}}>
  <div>
    <div style={{fontSize:'11px',fontWeight:'500',textTransform:'uppercase',letterSpacing:'.08em',color:'rgba(29,179,104,0.8)',marginBottom:'6px'}}>
      {isEn ? 'Upgrade to Pro' : 'Улучшить до Pro'}
    </div>
    <div style={{fontSize:'18px',fontWeight:'300',color:'#fff',marginBottom:'4px',letterSpacing:'-0.02em'}}>
      {isEn ? <>Remove watermark.<br/><b style={{fontWeight:500}}>Get your custom link.</b></> : <>Убери водяной знак.<br/><b style={{fontWeight:500}}>Получи именную ссылку.</b></>}
    </div>
    <div style={{fontSize:'12px',color:'rgba(255,255,255,0.45)',marginTop:'6px'}}>
      {isEn ? 'resumelink.cc/yourname · No watermark · $5/mo' : 'resumelink.cc/yourname · Без watermark · $5/мес'}
    </div>
  </div>
  <a href="https://resumelink.lemonsqueezy.com/checkout/buy/1b9011cf-d233-43ce-afa6-f817201f24a6?redirect_url=https://resumelink.cc/pricing.html?pro=activated"
     target="_blank"
     style={{background:'var(--green)',color:'#fff',padding:'13px 28px',borderRadius:'10px',fontSize:'14px',fontWeight:'500',textDecoration:'none',whiteSpace:'nowrap',flexShrink:0,display:'inline-block'}}>
    {isEn ? 'Upgrade → $5/mo' : 'Улучшить → $5/мес'}
  </a>
</div>
      
      <footer className="site-footer" style={{marginTop:'3rem'}}>
        <a href="/" className="footer-logo">Resume<span>Link</span></a>
        <div className="footer-links">
          <a href="/policy.html">{C.footerPolicy}</a>
          <a href="mailto:info@resumelink.cc">info@resumelink.cc</a>
        </div>

      </footer>

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

<script>
function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}

window.__RL_SET_RESUME_DATA__ = function(data) {
  window.__RL_RESUME_DATA__ = data;
  ['share-button','download-button'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'flex';
  });
};

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('share-button');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    const isEn = navigator.language.startsWith('en');
    try {
      if (navigator.share) {
        await navigator.share({ title: 'ResumeLink Profile', url: location.href });
      } else {
        await navigator.clipboard.writeText(location.href);
        const lbl = document.getElementById('share-label');
        lbl.textContent = isEn ? 'Copied!' : 'Скопировано!';
        setTimeout(() => { lbl.textContent = isEn ? 'Share' : 'Поделиться'; }, 2000);
      }
    } catch(e) { console.error(e); }
  });
});

function printResume() {
  const data = window.__RL_RESUME_DATA__;
  if (!data) { alert('Please wait and try again.'); return; }
  const isPro = localStorage.getItem('rl_pro') === 'true';
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const L = data.labels || {};
  const pageUrl = location.href;
  const parts = (data.name||'').trim().split(' ');
  const firstName = parts.slice(0,-1).join(' ') || parts[0] || '';
  const lastName  = parts.length > 1 ? parts[parts.length-1] : '';
  const contacts = [
    data.contacts?.p && '<span>'+esc(data.contacts.p)+'</span>',
    data.contacts?.e && '<span>'+esc(data.contacts.e)+'</span>',
    data.contacts?.l && '<span>'+esc(data.contacts.l)+'</span>'
  ].filter(Boolean).join('<span class="rl-sep">|</span>');

  const eduHtml = (data.education||[]).map(ed=>`<div class="rl-edu-item"><div class="rl-edu-degree">${esc(ed.d)}</div><div class="rl-edu-school">${esc(ed.s)}</div><div class="rl-edu-year">${esc(ed.y)}</div></div>`).join('');
  const langsHtml = (data.languages||[]).map(l=>`<div class="rl-lang-item">— ${esc(l)}</div>`).join('');
  const hobbiesHtml = (data.hobbies||[]).length > 0 ? `<div class="rl-section"><div class="rl-section-title">${esc(L.hobbies||'Hobbies')}</div><div class="rl-lang-item">${esc((data.hobbies||[]).join(', '))}</div></div>` : '';
  const expHtml = (data.experience||[]).map(ex=>`<div class="rl-exp-entry"><div class="rl-exp-header"><span class="rl-exp-title">${esc(ex.p)}</span><span class="rl-exp-period">${esc(ex.t)}</span></div><div class="rl-exp-company">${esc(ex.c)}</div><div class="rl-exp-desc">${esc(ex.d)}</div><div class="rl-exp-divider"></div></div>`).join('');
  const addHtml = (data.additional||[]).filter(b=>b&&b.title).map(b=>`<div class="rl-section"><div class="rl-section-title">${esc(b.title)}</div><div class="rl-additional-text">${esc(b.content)}</div></div>`).join('');

  const styleEl = document.createElement('style');
  styleEl.id = 'rl-print-styles';
  styleEl.innerHTML = `
    @page{size:A4 portrait;margin:0}
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box;margin:0;padding:0}
    #rl-print-dom{font-family:'DM Sans',sans-serif;color:#0D3D28;width:210mm;background:#fff}
    .rl-header{display:flex;justify-content:space-between;align-items:center;padding:18pt 22pt 14pt 18pt;border-bottom:1.5pt solid #C5E8D5;background:#F2FAF6}
    .rl-name-first{font-size:26pt;font-weight:300;line-height:1.1;display:block;color:#0D3D28}
    .rl-name-last{font-size:26pt;font-weight:600;line-height:1.1;display:block;color:#1DB368}
    .rl-job-title{font-size:7pt;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#5A8A70;margin-top:5pt}
    .rl-photo{width:56pt;height:56pt;border-radius:50%;background:#EAF7F0;border:1pt solid #C5E8D5;flex-shrink:0}
    .rl-contacts{display:flex;align-items:center;justify-content:center;background:#0D3D28;padding:7pt 0;width:100%}
    .rl-contacts span{color:#EAF7F0;font-size:6.5pt;white-space:nowrap;padding:0 10pt}
    .rl-sep{color:#5A8A70!important;padding:0 2pt!important}
    .rl-body{display:table;width:210mm;table-layout:fixed;border-collapse:collapse}
    .rl-sidebar{display:table-cell;width:62mm;background:#F2FAF6;vertical-align:top;padding:16pt 14pt 24pt 14pt;border-right:1pt solid #C5E8D5}
    .rl-main{display:table-cell;width:148mm;background:#fff;vertical-align:top;padding:14pt 18pt 24pt 18pt}
    .rl-section{margin-bottom:14pt;break-inside:avoid;page-break-inside:avoid}
    .rl-section-title{font-size:6.5pt;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#0D3D28;border-bottom:1.5pt solid #1DB368;padding-bottom:4pt;margin-bottom:9pt}
    .rl-edu-item{margin-bottom:10pt;break-inside:avoid}
    .rl-edu-degree{font-size:7.5pt;font-weight:600;color:#0D3D28}
    .rl-edu-school{font-size:6.5pt;color:#5A8A70;margin-top:1pt}
    .rl-edu-year{font-size:6pt;color:#A8CDB9;margin-top:1pt}
    .rl-lang-item{font-size:7pt;color:#5A8A70;padding:2pt 0}
    .rl-qr-section{margin-top:4pt}
    .rl-qr-img{width:72pt;height:72pt;display:block;margin:0 0 5pt}
    .rl-qr-url{font-size:5pt;color:#1DB368;word-break:break-all;line-height:1.4}
    .rl-summary{font-size:8pt;font-style:italic;line-height:1.65;color:#5A8A70;margin-bottom:14pt}
    .rl-exp-entry{break-inside:avoid;page-break-inside:avoid;margin-bottom:2pt}
    .rl-exp-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1pt}
    .rl-exp-title{font-size:8.5pt;font-weight:600;color:#0D3D28}
    .rl-exp-period{font-size:7pt;font-weight:500;color:#1DB368;white-space:nowrap;margin-left:8pt}
    .rl-exp-company{font-size:7pt;color:#5A8A70;margin-bottom:4pt}
    .rl-exp-desc{font-size:7pt;color:#5A8A70;line-height:1.55}
    .rl-exp-divider{border-top:.5pt solid #C5E8D5;margin:8pt 0}
    .rl-exp-entry:last-child .rl-exp-divider{display:none}
    .rl-additional-text{font-size:7.5pt;color:#5A8A70;line-height:1.55}
    .rl-watermark{position:fixed;bottom:0;left:0;right:0;font-size:5.5pt;color:#A8CDB9;text-align:center;border-top:.5pt solid #C5E8D5;padding:3pt 0;background:#fff;font-family:'DM Sans',sans-serif;letter-spacing:.05em}
  `;

  const html = `<div id="rl-print-dom">
    <div class="rl-header">
      <div>
        <span class="rl-name-first">${esc(firstName)}</span>
        <span class="rl-name-last">${esc(lastName)}</span>
        <div class="rl-job-title">${esc(data.title)}</div>
      </div>
      <div class="rl-photo"></div>
    </div>
    <div class="rl-contacts">${contacts}</div>
    <div class="rl-body">
      <div class="rl-sidebar">
        ${eduHtml ? `<div class="rl-section"><div class="rl-section-title">${esc(L.education||'Education')}</div>${eduHtml}</div>` : ''}
        ${langsHtml ? `<div class="rl-section"><div class="rl-section-title">${esc(L.languages||'Languages')}</div>${langsHtml}</div>` : ''}
        ${hobbiesHtml}
        <div class="rl-section rl-qr-section">
          <div class="rl-section-title">Online Profile</div>
          <img class="rl-qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${encodeURIComponent(pageUrl)}" alt="QR">
          <div class="rl-qr-url">${esc(pageUrl)}</div>
        </div>
      </div>
      <div class="rl-main">
        ${data.summary ? `<div class="rl-summary">${esc(data.summary)}</div>` : ''}
        ${expHtml ? `<div class="rl-section"><div class="rl-section-title">${esc(L.experience||'Experience')}</div>${expHtml}</div>` : ''}
        ${addHtml}
      </div>
    </div>
    ${isPro ? '' : `<div class="rl-watermark">Made with ResumeLink.cc · <span style="color:#1DB368">${esc(pageUrl)}</span></div>`}
  </div>`;

const wrap = document.createElement('div');
wrap.innerHTML = html;
const dom = wrap.firstElementChild;

const old = document.getElementById('rl-print-dom');
if (old) old.parentNode?.removeChild(old);
const oldStyle = document.getElementById('rl-print-styles');
if (oldStyle) oldStyle.parentNode?.removeChild(oldStyle);

document.head.appendChild(styleEl);
document.body.appendChild(dom);

setTimeout(() => {
    window.print();
    setTimeout(() => {
        dom?.parentNode?.removeChild(dom);
        styleEl?.parentNode?.removeChild(styleEl);
    }, 1500);
}, 1200);
}

    // Если уже загружен
    if (qrImg.complete) doPrint();
} else {
    requestAnimationFrame(() => requestAnimationFrame(doPrint));
}
}
</script>
