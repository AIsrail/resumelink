title: ResumeLink
url: "https://resumelink.cc"
baseurl: ""

# Явно разрешаем Jekyll использовать эти папки
include: ["_roles", "_data", "_layouts"]

collections:
  roles:
    output: true
    permalink: /roles/:name/

defaults:
  - scope:
      path: ""
      type: "roles"
    values:
      layout: "role"
