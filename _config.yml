title: ResumeLink
url: "https://resumelink.cc"

collections:
  roles:
    output: true
    permalink: /roles/:name/

# Это заставит Jekyll "увидеть" папку, даже если он хочет её проигнорировать
include: ["_roles"]

defaults:
  - scope:
      path: ""
      type: "roles"
    values:
      layout: "role"
